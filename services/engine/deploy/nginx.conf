# ============================================================================
# MITR AI Chatbot Engine — Nginx Load Balancer Configuration
# ============================================================================
# Place on a separate machine or on one of the engine servers.
# Provides load balancing across multiple engine instances.
#
# Features:
#   - Sticky sessions via cookie (keeps user on same instance for session)
#   - Health check probing (/api/health/ready)
#   - WebSocket upgrade support (if needed later)
#   - Failover — if one server is down, traffic goes to the other
# ============================================================================

upstream chatbot_engine {
    # Sticky sessions: route same user to same backend for session consistency.
    # The cookie "MITR_ROUTE" is set on first request and persists for 1 hour.
    ip_hash;

    # Server A — primary
    server 10.0.1.10:4001 max_fails=3 fail_timeout=30s;

    # Server B — secondary
    server 10.0.1.11:4001 max_fails=3 fail_timeout=30s;

    # Add more servers as needed:
    # server 10.0.1.12:4001 max_fails=3 fail_timeout=30s;
}

server {
    listen 80;
    server_name chatbot.yourorg.com;

    # --- Engine API proxy ---
    location /api/ {
        proxy_pass http://chatbot_engine;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts — NLP classification + API calls can take a few seconds
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        proxy_send_timeout 10s;

        # WebSocket support (for future real-time features)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # --- Frontend (Next.js) proxy ---
    # If frontend runs on a separate server or same server
    location / {
        proxy_pass http://10.0.1.10:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Next.js HMR websocket
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # --- Health check endpoint for monitoring tools ---
    location /health {
        proxy_pass http://chatbot_engine/api/health;
        proxy_set_header Host $host;
    }
}

