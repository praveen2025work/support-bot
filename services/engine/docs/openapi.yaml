                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ════════════════════════════════════════════════════════════════════════
  # ADMIN — LEARNING
  # ════════════════════════════════════════════════════════════════════════
  /api/admin/learning/review:
    get:
      tags: [Admin/Learning]
      summary: Get the learning review queue
      security:
        - ApiKeyAuth: []
      parameters:
        - name: groupId
          in: query
          schema:
            type: string
            default: default
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: status
          in: query
          schema:
            type: string
          description: Filter by review status
      responses:
        '200':
          description: Review queue items
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/ReviewItem'
                  total:
                    type: integer
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/admin/learning/review/{id}/resolve:
    post:
      tags: [Admin/Learning]
      summary: Resolve a review item with the correct intent
      security:
        - ApiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - correctIntent
              properties:
                correctIntent:
                  type: string
                  example: query.open_tickets
                groupId:
                  type: string
                  default: default
      responses:
        '200':
          description: Item resolved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          description: Missing correctIntent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Review item not found or already resolved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/admin/learning/review/{id}/dismiss:
    post:
      tags: [Admin/Learning]
      summary: Dismiss a review item
      security:
        - ApiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                groupId:
                  type: string
                  default: default
      responses:
        '200':
          description: Item dismissed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Review item not found or already resolved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/admin/learning/stats:
    get:
      tags: [Admin/Learning]
      summary: Get learning statistics
      security:
        - ApiKeyAuth: []
      parameters:
        - name: groupId
          in: query
          schema:
            type: string
            default: default
      responses:
        '200':
          description: Learning stats
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LearningStats'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/admin/learning/auto-learned:
    get:
      tags: [Admin/Learning]
      summary: Get auto-learned items
      security:
        - ApiKeyAuth: []
      parameters:
        - name: groupId
          in: query
          schema:
            type: string
            default: default
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        '200':
          description: Auto-learned items
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      type: object
                  total:
                    type: integer
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/admin/learning/retrain:
    post:
      tags: [Admin/Learning]
      summary: Trigger NLP model retraining
      description: |
        Invalidates the cached NLP engine for the specified group, forcing a retrain
        on the next request. Use groupId "all" to retrain all groups.
      security:
        - ApiKeyAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                groupId:
                  type: string
                  default: default
                  example: all
      responses:
        '200':
          description: Retrain triggered
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  groupId:
                    type: string
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/admin/learning/process-signals:
    post:
      tags: [Admin/Learning]
      summary: Process pending feedback signals
      description: Processes accumulated user feedback signals and updates the learning model.
      security:
        - ApiKeyAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                groupId:
                  type: string
                  default: default
      responses:
        '200':
          description: Signals processed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  processed:
                    type: integer
                  newReviewItems:
                    type: integer
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ════════════════════════════════════════════════════════════════════════
  # ADMIN — SETTINGS
  # ════════════════════════════════════════════════════════════════════════
  /api/admin/settings:
    get:
      tags: [Admin/Settings]
      summary: Get current engine settings
      security:
        - ApiKeyAuth: []
      responses:
        '200':
          description: Engine settings
          content:
            application/json:
              schema:
                type: object
                properties:
                  config:
                    $ref: '#/components/schemas/EngineSettings'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    post:
      tags: [Admin/Settings]
      summary: Update engine settings
      description: Merges the provided fields into the current settings.
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EngineSettings'
      responses:
        '200':
          description: Settings updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  config:
                    $ref: '#/components/schemas/EngineSettings'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ════════════════════════════════════════════════════════════════════════
  # ADMIN — LOGS
  # ════════════════════════════════════════════════════════════════════════
  /api/admin/logs:
    get:
      tags: [Admin/Logs]
      summary: Get conversation logs
      security:
        - ApiKeyAuth: []
      parameters:
        - name: group
          in: query
          schema:
            type: string
          description: Filter by group ID
        - name: intent
          in: query
          schema:
            type: string
          description: Filter by intent
        - name: search
          in: query
          schema:
            type: string
          description: Full-text search in user messages and bot responses
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
          description: Maximum number of logs to return
      responses:
        '200':
          description: Conversation logs
          content:
            application/json:
              schema:
                type: object
                properties:
                  logs:
                    type: array
                    items:
                      $ref: '#/components/schemas/ConversationLog'
                  total:
                    type: integer
                  filtered:
                    type: integer
                  intentDistribution:
                    type: object
                    additionalProperties:
                      type: integer
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      tags: [Admin/Logs]
      summary: Clear all conversation logs
      security:
        - ApiKeyAuth: []
      responses:
        '200':
          description: Logs cleared
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ════════════════════════════════════════════════════════════════════════
  # ADMIN — AUDIT
  # ════════════════════════════════════════════════════════════════════════
  /api/admin/audit:
    get:
      tags: [Admin/Audit]
      summary: Get admin audit log
      security:
        - ApiKeyAuth: []
      parameters:
        - name: resource
          in: query
          schema:
            type: string
          description: Filter by resource type (group, query, user, etc.)
        - name: groupId
          in: query
          schema:
            type: string
          description: Filter by group ID
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: since
          in: query
          schema:
            type: string
            format: date-time
          description: Only include entries after this timestamp
      responses:
        '200':
          description: Audit entries
          content:
            application/json:
              schema:
                type: object
                properties:
                  entries:
                    type: array
                    items:
                      $ref: '#/components/schemas/AuditEntry'
                  count:
                    type: integer
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
