# ═══════════════════════════════════════════════════════
# Sample Database Instances for Connector Testing
# ═══════════════════════════════════════════════════════
# Usage: docker compose -f docker-compose.sample-db.yml up -d
#
# Spins up:
#   - SQL Server 2022 on port 1433
#   - Oracle XE 21c on port 1521
#
# Credentials:
#   SQL Server: sa / SamplePass123!
#   Oracle:     system / SamplePass123  (SID: XE, Service: XEPDB1)
#
# Seed data is auto-loaded on first start via init scripts.
# ═══════════════════════════════════════════════════════

services:
  # ── SQL Server 2022 ──
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sample-mssql
    ports:
      - "1433:1433"
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "SamplePass123!"
      MSSQL_PID: Developer
    volumes:
      - mssql-data:/var/opt/mssql
      - ./scripts/sample-db/mssql:/docker-entrypoint-initdb.d
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "SamplePass123!" -Q "SELECT 1" -C -N || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # Seed runner — waits for SQL Server, then runs init script
  mssql-seed:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sample-mssql-seed
    depends_on:
      mssql:
        condition: service_healthy
    volumes:
      - ./scripts/sample-db/mssql:/scripts
    entrypoint: /bin/bash
    command: >
      -c "/opt/mssql-tools18/bin/sqlcmd -S mssql -U sa -P 'SamplePass123!' -C -N -i /scripts/seed.sql && echo '✅ MSSQL seed complete'"
    restart: "no"

  # ── Oracle XE 21c ──
  oracle:
    image: gvenzl/oracle-xe:21-slim
    container_name: sample-oracle
    ports:
      - "1521:1521"
    environment:
      ORACLE_PASSWORD: SamplePass123
      APP_USER: testuser
      APP_USER_PASSWORD: TestPass123
    volumes:
      - oracle-data:/opt/oracle/oradata
      - ./scripts/sample-db/oracle:/container-entrypoint-initdb.d
    healthcheck:
      test: healthcheck.sh
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: unless-stopped

volumes:
  mssql-data:
  oracle-data:
