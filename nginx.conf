# ═══════════════════════════════════════════════════════════════════
# Nginx Reverse Proxy Configuration for Chatbot Platform
# ═══════════════════════════════════════════════════════════════════
#
# HOW IT WORKS:
#   Nginx sits in front of the Next.js UI (port 3001).
#   All browser traffic hits Nginx on port 80/443.
#   Nginx forwards every request to the UI.
#   The UI internally proxies /api/* to the Engine (port 4001)
#   via next.config.mjs rewrites — Nginx does NOT need to know
#   about the Engine.
#
# INSTALLATION (Ubuntu/Debian):
#   1. sudo cp nginx.conf /etc/nginx/sites-available/chatbot
#   2. sudo ln -s /etc/nginx/sites-available/chatbot /etc/nginx/sites-enabled/
#   3. sudo rm /etc/nginx/sites-enabled/default
#   4. Edit server_name below to match your domain or IP
#   5. sudo nginx -t          ← test config (must show "ok")
#   6. sudo systemctl reload nginx
#
# INSTALLATION (RHEL/CentOS — no sites-available):
#   1. sudo cp nginx.conf /etc/nginx/conf.d/chatbot.conf
#   2. Edit server_name below to match your domain or IP
#   3. sudo nginx -t
#   4. sudo systemctl reload nginx
#
# PREREQUISITES:
#   - ChatbotUI running on localhost:3001 (systemd or Docker)
#   - ChatbotEngine running on localhost:4001
#   - For HTTPS: SSL certificate (see Option B below, or use certbot)
#
# ═══════════════════════════════════════════════════════════════════


# ─────────────────────────────────────────────────────
# Option A: HTTP only (for initial testing / internal)
# ─────────────────────────────────────────────────────
# Uncomment this block if you want plain HTTP first.
# Once everything works, switch to Option B (HTTPS).
#
# server {
#     listen 80;
#     server_name chatbot.your-company.com;   # ← CHANGE to your domain or IP
#
#     # Security headers (still useful over HTTP on internal networks)
#     add_header X-Content-Type-Options nosniff;
#     add_header X-Frame-Options SAMEORIGIN;
#     add_header X-XSS-Protection "1; mode=block";
#
#     # Forward all requests to the Next.js UI
#     location / {
#         proxy_pass http://127.0.0.1:3001;   # ← UI listens here
#         proxy_http_version 1.1;
#
#         # Pass the real client IP to Next.js
#         proxy_set_header Host $host;
#         proxy_set_header X-Real-IP $remote_addr;
#         proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
#         proxy_set_header X-Forwarded-Proto $scheme;
#
#         # WebSocket support (needed for Next.js HMR in dev)
#         proxy_set_header Upgrade $http_upgrade;
#         proxy_set_header Connection "upgrade";
#
#         proxy_read_timeout 60s;
#         proxy_send_timeout 60s;
#     }
#
#     # Cache Next.js static assets (JS/CSS bundles) for 1 year
#     location /_next/static/ {
#         proxy_pass http://127.0.0.1:3001;
#         expires 365d;
#         add_header Cache-Control "public, immutable";
#     }
#
#     # Health check — no access log noise
#     location /api/health {
#         proxy_pass http://127.0.0.1:3001;
#         access_log off;
#     }
# }


# ─────────────────────────────────────────────────────
# Option B: HTTPS (production — recommended)
# ─────────────────────────────────────────────────────

# Step 1: Redirect all HTTP traffic to HTTPS
server {
    listen 80;
    server_name chatbot.your-company.com;   # ← CHANGE to your domain or IP
    return 301 https://$host$request_uri;   # permanent redirect
}

# Step 2: Main HTTPS server
server {
    listen 443 ssl http2;
    server_name chatbot.your-company.com;   # ← CHANGE to match above

    # ── SSL Configuration ──
    # Replace paths with your certificate, or run:
    #   sudo certbot --nginx -d chatbot.your-company.com
    # Certbot will auto-fill these lines for you.
    ssl_certificate     /etc/letsencrypt/live/chatbot.your-company.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chatbot.your-company.com/privkey.pem;

    # Only allow modern TLS — TLS 1.0/1.1 are insecure
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # ── Security Headers ──
    # Prevent MIME sniffing, clickjacking, and XSS attacks
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-XSS-Protection "1; mode=block";

    # ── Proxy Settings (shared by all location blocks) ──
    proxy_http_version 1.1;              # Required for keepalive and WebSockets
    proxy_set_header Host $host;         # Pass original hostname to Node.js
    proxy_set_header X-Real-IP $remote_addr;           # Real client IP
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;  # Full proxy chain
    proxy_set_header X-Forwarded-Proto $scheme;        # http or https

    # ── WebSocket Support ──
    # Needed for Next.js HMR in dev; harmless in production
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    # ── All traffic → Next.js UI on port 3001 ──
    # The UI internally proxies /api/* to the Engine (port 4001)
    # via next.config.mjs rewrites — Nginx does NOT talk to Engine directly
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # ── Static assets — long cache ──
    # Next.js hashes filenames, so 1-year cache is safe
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3001;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # ── Health check (optional) ──
    # Useful for load balancers or monitoring — no access log noise
    location /api/health {
        proxy_pass http://127.0.0.1:3001;
        access_log off;
    }
}
