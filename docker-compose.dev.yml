version: '3.8'

# ═══════════════════════════════════════════════════════
# DEV MODE — UI + Engine (no Mock API)
# Real tenant APIs provide data endpoints.
# Real AD/SSO provides user authentication.
#
# Prerequisites: Copy .env.dev and fill in real values
# Usage: docker compose -f docker-compose.dev.yml up
# ═══════════════════════════════════════════════════════

services:
  # ── Service 1: UI (Next.js frontend) ──
  ui:
    build: .
    ports:
      - '3001:3001'
    env_file: .env.dev
    environment:
      - ENGINE_URL=http://engine:4001
    depends_on:
      - engine
    restart: unless-stopped

  # ── Service 2: Engine (NLP + Query Execution + Admin API) ──
  engine:
    build: ./services/engine
    ports:
      - '4001:4001'
    env_file: .env.dev
    environment:
      - UI_ORIGIN=http://ui:3001
    restart: unless-stopped
